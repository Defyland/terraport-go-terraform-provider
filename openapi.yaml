openapi: 3.1.0
info:
  title: Fake BankPort Platform API
  version: 0.1.0
  description: HTTP contract consumed by the Terraport Terraform provider acceptance tests.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://api.terraport.local
security:
  - bearerAuth: []
paths:
  /v1/products/{product_code}:
    get:
      summary: Read API product metadata
      operationId: getAPIProduct
      parameters:
        - $ref: "#/components/parameters/ProductCode"
      responses:
        "200":
          description: API product metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIProduct"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/partner-apps:
    post:
      summary: Create a partner application
      operationId: createPartnerApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerAppRequest"
      responses:
        "201":
          description: Created partner application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerApp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/partner-apps/{id}:
    get:
      summary: Read a partner application
      operationId: getPartnerApp
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Partner application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerApp"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a partner application
      operationId: updatePartnerApp
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerAppRequest"
      responses:
        "200":
          description: Updated partner application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerApp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a partner application
      operationId: deletePartnerApp
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/partner-apps/{id}/rotate-secret:
    post:
      summary: Rotate partner app client secret
      operationId: rotatePartnerAppSecret
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: New client secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretRotation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/webhook-endpoints:
    post:
      summary: Create a webhook endpoint
      operationId: createWebhookEndpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEndpointRequest"
      responses:
        "201":
          description: Created webhook endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/webhook-endpoints/{id}:
    get:
      summary: Read a webhook endpoint
      operationId: getWebhookEndpoint
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Webhook endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a webhook endpoint
      operationId: updateWebhookEndpoint
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEndpointRequest"
      responses:
        "200":
          description: Updated webhook endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a webhook endpoint
      operationId: deleteWebhookEndpoint
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/webhook-endpoints/{id}/rotate-secret:
    post:
      summary: Rotate webhook signing secret
      operationId: rotateWebhookSigningSecret
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: New signing secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretRotation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/rate-limit-policies:
    post:
      summary: Create a rate-limit policy
      operationId: createRateLimitPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateLimitPolicyRequest"
      responses:
        "201":
          description: Created rate-limit policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitPolicy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/rate-limit-policies/{id}:
    get:
      summary: Read a rate-limit policy
      operationId: getRateLimitPolicy
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Rate-limit policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitPolicy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a rate-limit policy
      operationId: updateRateLimitPolicy
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateLimitPolicyRequest"
      responses:
        "200":
          description: Updated rate-limit policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitPolicy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a rate-limit policy
      operationId: deleteRateLimitPolicy
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/sandbox-environments:
    post:
      summary: Create a sandbox environment
      operationId: createSandboxEnvironment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxEnvironmentRequest"
      responses:
        "201":
          description: Created sandbox environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxEnvironment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/sandbox-environments/{id}:
    get:
      summary: Read a sandbox environment
      operationId: getSandboxEnvironment
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Sandbox environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxEnvironment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a sandbox environment
      operationId: updateSandboxEnvironment
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxEnvironmentRequest"
      responses:
        "200":
          description: Updated sandbox environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxEnvironment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a sandbox environment
      operationId: deleteSandboxEnvironment
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ProductCode:
      name: product_code
      in: path
      required: true
      schema:
        type: string
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Retryable API rate limit
      headers:
        Retry-After:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: ["unauthorized"]
            message:
              type: string
              examples: ["invalid bearer token"]
    APIProduct:
      type: object
      required: [code, name, category, beta, regions, capabilities, docs_url]
      properties:
        code:
          type: string
        name:
          type: string
        category:
          type: string
        beta:
          type: boolean
        regions:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
        docs_url:
          type: string
          format: uri
    PartnerAppRequest:
      type: object
      required: [name, product_code, redirect_uris, scopes, status]
      properties:
        name:
          type: string
        product_code:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
        scopes:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, suspended]
    PartnerApp:
      allOf:
        - $ref: "#/components/schemas/PartnerAppRequest"
        - type: object
          required: [id, client_id, client_secret]
          properties:
            id:
              type: string
            client_id:
              type: string
            client_secret:
              type: string
              writeOnly: true
    WebhookEndpointRequest:
      type: object
      required: [partner_app_id, url, event_types, enabled]
      properties:
        partner_app_id:
          type: string
        url:
          type: string
          format: uri
        event_types:
          type: array
          items:
            type: string
        enabled:
          type: boolean
    WebhookEndpoint:
      allOf:
        - $ref: "#/components/schemas/WebhookEndpointRequest"
        - type: object
          required: [id, signing_secret]
          properties:
            id:
              type: string
            signing_secret:
              type: string
              writeOnly: true
    RateLimitPolicyRequest:
      type: object
      required: [product_code, subject_type, subject_id, requests_per_minute, burst_limit, mode]
      properties:
        product_code:
          type: string
        subject_type:
          type: string
          enum: [partner_app, organization, product]
        subject_id:
          type: string
        requests_per_minute:
          type: integer
          minimum: 1
        burst_limit:
          type: integer
          minimum: 1
        mode:
          type: string
          enum: [enforce, report]
    RateLimitPolicy:
      allOf:
        - $ref: "#/components/schemas/RateLimitPolicyRequest"
        - type: object
          required: [id]
          properties:
            id:
              type: string
    SandboxEnvironmentRequest:
      type: object
      required: [name, products, region, status]
      properties:
        name:
          type: string
        products:
          type: array
          items:
            type: string
        region:
          type: string
        status:
          type: string
          enum: [ready, paused]
    SandboxEnvironment:
      allOf:
        - $ref: "#/components/schemas/SandboxEnvironmentRequest"
        - type: object
          required: [id, api_key_token]
          properties:
            id:
              type: string
            api_key_token:
              type: string
              writeOnly: true
    SecretRotation:
      type: object
      properties:
        client_secret:
          type: string
          writeOnly: true
        signing_secret:
          type: string
          writeOnly: true
